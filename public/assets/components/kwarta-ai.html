<div class="ai-container">
        <div class="chat-window">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="display: flex; align-items: center; gap: 10px;">
                    Kwarta AI 
                    <span class="online-indicator">
                        <span class="online-dot"></span>
                        Online
                    </span>
                </h3>
                <p>Personal Financial Assistant</p>
            </div>
            <button id="btn-clear-chat" title="Clear Chat History" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); font-size: 1.1em; color: rgba(255,255,255,0.9); cursor: pointer; transition: all 0.25s ease; border-radius: 10px; padding: 8px 12px; display:flex; align-items:center; justify-content:center; gap: 6px; font-weight: 500;">
                <i data-lucide="trash-2"></i>
                <span style="font-size: 0.85em;">Clear Chat</span>
            </button>
        </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="msg ai-msg">
                    <div class="msg-bubble">
                        Hello {User}! I'm Kwarta, your budget assistant. Want me to do a breakdown of your finances? Just tell me what to do!
                    </div>
                </div>


            </div>

            <div class="chat-input-area">
                <div class="prompt-chips">
                    <button class="chip">Monthly Summary</button>
                    <button class="chip">Top Expense</button>
                    <button class="chip">Savings Tips</button>
                    <button class="chip">Recent Transactions</button>
                    <button class="chip">Wallet Breakdown</button>
                    <button class="chip">Budget Advice</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" placeholder="Ask Kwarta AI about your finances...">
                    <button class="btn-send" title="Send Message">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
